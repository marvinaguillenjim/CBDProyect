[defaults]
host_key_checking = False
transport = ssh
jinja2_extensions = jinja2.ext.do
remote_user = ubuntu
private_key_file = ~/alucloud90-priv.pem 
interpreter_python = auto
inventory = /home/alucloud90/proyectocbd/inventory_aws_ec2.yml
[ssh_connection]
