  # Proyecto: Despliegue de Clúster Hadoop Distribuido (4 Nodos) - CORREGIDO
# Configuración: Hadoop 3.3.1 + Apache2 + Python Streaming
# Optimizaciones: Uso de IPs privadas para comunicación interna y límites de RAM

#####################
# 1. PROVISIÓN DE VMs
#####################
- name: Provision VMs
  hosts: localhost
  connection: local
  tags: [provision]
  vars:
    instance_type: t3.small
    image: ami-0c7217cdde317cfec
    subnet_id: subnet-2bfb6c4f
    ansible_ssh_common_args: '-o StrictHostKeyChecking=no' 
  tasks:
    - name: Provisioning EC2 instance(s)
      local_action: ec2
           keypair="alucloud{{ id }}-keypair"
           group="gs-aws-{{ id }}"
           instance_type="{{ instance_type }}"
           image="{{ image }}"
           wait=true
           count=4
           vpc_subnet_id="{{ subnet_id }}"
           region="us-east-1"
           instance_tags='{"ansible":"alucloud{{ id }}"}'
      register: ec2vms
      run_once: true

    - name: Add new instance to host group
      local_action: add_host 
        hostname={{ item.public_ip }} 
        groupname=ec2hosts 
        private_ip={{ item.private_ip }}
      with_items: "{{ ec2vms.instances }}"

    - name: Waiting for the new instance(s) to be ready
      local_action: wait_for
           host={{ item.public_dns_name }} port=22 delay=30 timeout=450 state=started
      with_items: "{{ ec2vms.instances }}"

######################################
# 2. INSTALACIÓN Y CONFIGURACIÓN CLÚSTER
######################################
- name: Configure VM(s)
  hosts: ec2hosts
  become: yes
  tags: [configuration]
  vars:
    hadoop_ver: "3.3.1"
    hadoop_home: "/usr/local/hadoop"
    java_home: "/usr/lib/jvm/java-11-openjdk-amd64"
    # El primer nodo de la lista será el Maestro
    master_node: "{{ groups['ec2hosts'][0] }}"
    # EXTRAEMOS LA IP PRIVADA DEL MAESTRO PARA HADOOP
    master_private_ip: "{{ hostvars[master_node]['private_ip'] }}"

  tasks:
    - name: Wait for cloud-init to finish
      wait_for: 
        path: /var/log/cloud-init.log
        timeout: 300
        search_regex: "final-message"
      ignore_errors: yes

    - name: Instalar Dependencias (Java, Apache y Net-tools)
      apt:
        name: [openjdk-11-jdk, apache2, net-tools]
        update_cache: yes
        state: present

    # --- BLOQUE CRÍTICO: CONFIGURACIÓN SSH PARA HADOOP ---
    - name: Generar llave SSH para el usuario ubuntu en todos los nodos
      user:
        name: ubuntu
        generate_ssh_key: yes
        ssh_key_bits: 2048
        ssh_key_file: .ssh/id_rsa

    - name: Leer la llave pública generada en el MAESTRO
      shell: cat /home/ubuntu/.ssh/id_rsa.pub
      register: master_ssh_key
      when: inventory_hostname == master_node

    - name: Autorizar la llave del Maestro en todos los nodos
      authorized_key:
        user: ubuntu
        state: present
        key: "{{ hostvars[master_node]['master_ssh_key']['stdout'] }}"

    - name: Configurar SSH para evitar confirmación manual de hosts
      copy:
        content: |
          Host *
              StrictHostKeyChecking no
              UserKnownHostsFile /dev/null
        dest: /home/ubuntu/.ssh/config
        owner: ubuntu
        group: ubuntu
        mode: '0600'

    # --- INSTALACIÓN DE HADOOP ---
    - name: Descargar Hadoop {{ hadoop_ver }}
      get_url:
        url: "https://archive.apache.org/dist/hadoop/common/hadoop-{{ hadoop_ver }}/hadoop-{{ hadoop_ver }}.tar.gz"
        dest: /tmp/hadoop.tar.gz

    - name: Extraer Hadoop
      unarchive:
        src: /tmp/hadoop.tar.gz
        dest: /usr/local
        remote_src: yes
        creates: "/usr/local/hadoop-{{ hadoop_ver }}"

    - name: Configurar enlace simbólico y permisos
      file:
        src: "/usr/local/hadoop-{{ hadoop_ver }}"
        dest: "{{ hadoop_home }}"
        state: link
        owner: ubuntu
        group: ubuntu

    # --- CORRECCIÓN JAVA_HOME Y RAM ---
    - name: Forzar JAVA_HOME y límites de RAM en hadoop-env.sh
      blockinfile:
        path: "{{ hadoop_home }}/etc/hadoop/hadoop-env.sh"
        block: |
          export JAVA_HOME={{ java_home }}
          export HADOOP_NAMENODE_OPTS="-Xmx600m"
          export HADOOP_DATANODE_OPTS="-Xmx512m"
          export YARN_RESOURCEMANAGER_OPTS="-Xmx512m"

    - name: Configurar archivo de workers (Usando IPs privadas)
      copy:
        content: |
          {% for host in groups['ec2hosts'] %}
          {{ hostvars[host]['private_ip'] }}
          {% endfor %}
        dest: "{{ hadoop_home }}/etc/hadoop/workers"
        owner: ubuntu

    - name: Configurar core-site.xml (Usando IP Privada del Maestro)
      blockinfile:
        path: "{{ hadoop_home }}/etc/hadoop/core-site.xml"
        insertafter: "<configuration>"
        block: |
          <property>
              <name>fs.defaultFS</name>
              <value>hdfs://{{ master_private_ip }}:9000</value>
          </property>

    - name: Configurar hdfs-site.xml
      blockinfile:
        path: "{{ hadoop_home }}/etc/hadoop/hdfs-site.xml"
        insertafter: "<configuration>"
        block: |
          <property>
              <name>dfs.replication</name>
              <value>2</value>
          </property>

    - name: Configurar Variables de Entorno en .bashrc
      blockinfile:
        path: /home/ubuntu/.bashrc
        block: |
          export JAVA_HOME={{ java_home }}
          export HADOOP_HOME={{ hadoop_home }}
          export PATH=$PATH:$HADOOP_HOME/bin:$HADOOP_HOME/sbin
          export HDFS_NAMENODE_USER=ubuntu
          export HDFS_DATANODE_USER=ubuntu
          export YARN_RESOURCEMANAGER_USER=ubuntu
          export YARN_NODEMANAGER_USER=ubuntu

    - name: Crear estructura de directorios local
      file:
        path: "{{ item }}"
        state: directory
        mode: '0755'
        owner: ubuntu
      with_items:
        - /opt/censo
        - /var/www/html/data

    - name: Desplegar Dashboard D3.js (index.html)
      copy:
        src: ./mi-visualizacion.html
        dest: /var/www/html/index.html
        owner: www-data
        mode: '0644'
      when: inventory_hostname == master_node

    - name: Copiar Dataset y Mappers
      copy:
        src: "{{ item.src }}"
        dest: "{{ item.dest }}"
        mode: '0755'
      with_items:
        - { src: './2026_1_Nconductores_censo_conductores_clases_antiguedad202601.txt', dest: '/opt/censo/conductores.csv' }
        - { src: './files/mapper_provincia.py', dest: '/opt/censo/mapper_provincia.py' }
        - { src: './files/reducer.py', dest: '/opt/censo/reducer.py' }

   # --- FLUJO DE TRABAJO HADOOP (Solo en Maestro) ---
    - name: Procesamiento MapReduce en Maestro
      block:
        - name: Formatear HDFS e iniciar servicios
          shell: |
            # 1. Limpieza total
            pkill -9 -u ubuntu java || true
            rm -rf /tmp/hadoop-ubuntu*
            
            # 2. Formateo
            {{ hadoop_home }}/bin/hdfs namenode -format -force
            
            # 3. Arranque
            {{ hadoop_home }}/sbin/start-dfs.sh
            {{ hadoop_home }}/sbin/start-yarn.sh
            
            # 4. Bucle de espera inteligente al puerto 9000
            for i in {1..50}; do
              if netstat -tuln | grep -q ":9000"; then 
                echo "Hadoop activo en intento $i"
                exit 0
              fi
              sleep 5
            done
            echo "Error: El puerto 9000 no abrio tras 250 segundos"
            exit 1
          become_user: ubuntu

        - name: Crear carpetas y subir datos a HDFS
          shell: |
            {{ hadoop_home }}/bin/hdfs dfs -mkdir -p /input/conductores
            {{ hadoop_home }}/bin/hdfs dfs -put -f /opt/censo/conductores.csv /input/conductores/
          become_user: ubuntu

        - name: Ejecutar Job MapReduce (Streaming)
          shell: |
            HADOOP_STREAMING_JAR=$(find {{ hadoop_home }}/share/hadoop/tools/lib/ -name "hadoop-streaming*.jar" | head -n 1)
            {{ hadoop_home }}/bin/hdfs dfs -rm -r /output/censo_resultados || true
            
            {{ hadoop_home }}/bin/hadoop jar $HADOOP_STREAMING_JAR \
              -files /opt/censo/mapper_provincia.py,/opt/censo/reducer.py \
              -mapper "python3 mapper_provincia.py" \
              -reducer "python3 reducer.py" \
              -input /input/conductores/conductores.csv \
              -output /output/censo_resultados
          become_user: ubuntu

        - name: Exportar resultados para el Dashboard HTML
          shell: |
            {{ hadoop_home }}/bin/hdfs dfs -cat /output/censo_resultados/part-* > /tmp/resultados.json
            sudo cp /tmp/resultados.json /var/www/html/data/resultados.json
            sudo chmod 644 /var/www/html/data/resultados.json
          become_user: ubuntu
      when: inventory_hostname == master_node