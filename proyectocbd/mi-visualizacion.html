<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Censo Conductores 2026</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://unpkg.com/topojson@3"></script>
    <style>
        :root { --primary: #e94560; --dark: #1a1a2e; --panel: #16213e; --text: #e2e8f0; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--dark); color: var(--text); margin: 0; }
        
        /* Layout */
        .container { max-width: 1200px; margin: auto; padding: 20px; }
        header { border-bottom: 2px solid var(--primary); padding-bottom: 10px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        
        /* Tabs */
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { background: var(--panel); border: 1px solid #0f3460; color: white; padding: 10px 20px; cursor: pointer; border-radius: 5px; transition: 0.3s; }
        .tab-btn.active { background: var(--primary); border-color: var(--primary); }
        
        /* Grid */
        .dashboard-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; }
        .card { background: var(--panel); padding: 20px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        
        /* Visuals */
        .provincia-path { stroke: #0f3460; stroke-width: 0.5px; transition: 0.2s; cursor: pointer; }
        .provincia-path:hover { stroke: var(--primary); stroke-width: 2px; }
        .tooltip { position: absolute; background: rgba(0,0,0,0.8); padding: 8px; border-radius: 4px; pointer-events: none; font-size: 12px; border: 1px solid var(--primary); }
        
        .metric { text-align: center; margin-bottom: 20px; }
        .metric-val { font-size: 2.5em; font-weight: bold; color: var(--primary); }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div>
                <h1>?? Censo de Conductores</h1>
                <p>Procesamiento Distribuido Hadoop · <span style="color: var(--primary)">DGT 2026</span></p>
            </div>
            <div id="status-badge" style="background: green; padding: 5px 10px; border-radius: 15px; font-size: 0.8em;">LIVE DATA</div>
        </header>

        <div class="tabs">
            <button class="tab-btn active" onclick="showTab('geo')">?? Vista Geográfica</button>
            <button class="tab-btn" onclick="showTab('permisos')">?? Tipos de Permiso</button>
            <button class="tab-btn" onclick="showTab('demo')">?? Demografía</button>
        </div>

        <div class="dashboard-grid">
            <!-- Columna Izquierda: Gráfico Principal -->
            <div class="card" id="main-chart-container">
                <h3 id="chart-title">Distribución por Provincias</h3>
                <div id="viz"></div>
            </div>

            <!-- Columna Derecha: Métricas y Top -->
            <div class="card">
                <div class="metric">
                    <div class="label">Total Conductores Procesados</div>
                    <div class="metric-val" id="total-count">-</div>
                </div>
                <hr style="border: 0; border-top: 1px solid #0f3460;">
                <h4>Ranking Detallado</h4>
                <div id="ranking-list"></div>
            </div>
        </div>
    </div>

    <div class="tooltip" style="opacity: 0;"></div>

    <script>
        let fullData = null;
        const dataPath = "data/datos.json"; // Generado por tu Reducer[cite: 6]

        // 1. Cargar Datos del Reducer
        d3.json(dataPath).then(data => {
            fullData = data;
            updateDashboard('geo');
        }).catch(e => console.error("Error cargando datos MapReduce", e));

        function showTab(type) {
            d3.selectAll('.tab-btn').classed('active', false);
            event.target.classList.add('active');
            updateDashboard(type);
        }

        function updateDashboard(mode) {
            const viz = d3.select("#viz");
            viz.selectAll("*").remove();
            
            if (mode === 'geo') {
                renderMap();
            } else if (mode === 'permisos') {
                renderBarChart(fullData.permiso, "Permisos por Clase");
            } else if (mode === 'demo') {
                renderPieChart(fullData.sexo, "Distribución por Género");
            }
            
            updateMetrics(mode);
        }

        function renderMap() {
            const width = 700, height = 500;
            const svg = d3.select("#viz").append("svg").attr("viewBox", `0 0 ${width} ${height}`);
            
            // Proyección para Espańa
            const projection = d3.geoConicConformal()
                .center([ -3, 40 ])
                .scale(2500)
                .translate([ width / 2, height / 2 ]);
            
            const path = d3.geoPath().projection(projection);
            const colorScale = d3.scaleSequential(d3.interpolateReds)
                .domain([0, d3.max(Object.values(fullData.provincia))]);

            // Nota: Aquí necesitarías un archivo JSON de la geometría de Espańa
            d3.json("https://raw.githubusercontent.com/codeforgermany/click-dummy-map/master/spain-provincias.json").then(geojson => {
                svg.selectAll("path")
                    .data(geojson.features)
                    .enter().append("path")
                    .attr("d", path)
                    .attr("class", "provincia-path")
                    .attr("fill", d => {
                        // Mapeo por código de provincia (ej: "28" para Madrid)
                        const val = fullData.provincia[d.properties.cod] || 0;
                        return colorScale(val);
                    })
                    .on("mouseover", (event, d) => {
                        const val = fullData.provincia[d.properties.cod] || 0;
                        d3.select(".tooltip").style("opacity", 1)
                          .html(`<b>${d.properties.name}</b><br>${val.toLocaleString()} conductores`)
                          .style("left", (event.pageX + 10) + "px")
                          .style("top", (event.pageY - 10) + "px");
                    })
                    .on("mouseout", () => d3.select(".tooltip").style("opacity", 0));
            });
        }

        function renderBarChart(dataObj, title) {
            // Lógica similar a tu index original pero con estilos mejorados y transiciones[cite: 6]
            const data = Object.entries(dataObj).map(([k, v]) => ({key: k, value: v}));
            // ... (implementar barras horizontales modernas)
        }

        function updateMetrics(mode) {
            const total = d3.sum(Object.values(fullData.provincia));
            d3.select("#total-count").text((total/1e6).toFixed(1) + "M");
        }
    </script>
</body>
</html>
