---
# Proyecto: Configuración de Clúster Web y Procesamiento MapReduce
# Basado en la plantilla de German Molto - Adaptado para Procesamiento de Censo

#####################
#
#  PROVISIÓN DE VMs
#
#####################
- name: Provision VMs
  hosts: all
  connection: local
  tags:
    - provision

  vars:
    instance_type: t2.micro
    image: ami-7dce6507 # Ubuntu 14.04 HVM (Asegúrate de que esta AMI sea válida en tu lab)
    subnet_id: subnet-2bfb6c4f 

  tasks:
    - name: Provisioning EC2 instance(s)
      local_action: ec2
           keypair="alucloud{{ id }}-keypair"
           group="gs-aws-{{ id }}"
           instance_type={{ instance_type }}
           image={{ image }}
           wait=true
           count=3
           vpc_subnet_id={{ subnet_id }}
           region="us-east-1"
           instance_tags='{"ansible":"alucloud{{ id }}"}'
      register: ec2vms

    - name: Add new instance to host group
      local_action: add_host hostname={{ item.public_ip }} groupname=ec2hosts
      with_items: "{{ ec2vms.instances }}"

    - name: Waiting for the new instance(s) to be ready
      local_action: wait_for
         host={{ item.public_dns_name }} port=22 delay=30 timeout=450 state=started
      with_items: "{{ ec2vms.instances }}"

#####################
#
#  CONFIGURACIÓN DE VMs Y MAPREDUCE
#
#####################
- name: Configure VM(s)
  hosts: ec2hosts
  become: yes
  tags:
    - configuration

  tasks:
    - name: Wait for cloud-init to finish
      wait_for: 
        path: /var/log/cloud-init.log
        timeout: 15
        search_regex: "final-message"

    - name: Instalar Apache Web Server
      apt: name=apache2 update_cache=yes state=present

    - name: Crear estructura de directorios
      file:
        path: "{{ item }}"
        state: directory
        mode: '0755'
        owner: www-data
        group: www-data
      with_items:
        - /opt/censo
        - /var/www/html/data

    - name: Desplegar archivo HTML con D3.js
      copy:
        src: ./mi-visualizacion.html
        dest: /var/www/html/index.html
        owner: www-data
        group: www-data
        mode: '0644'

    - name: Copiar dataset de conductores a los nodos
      copy:
        src: ./2026_1_Nconductores_censo_conductores_clases_antiguedad202601.txt
        dest: /home/ubuntu/conductores.txt
        owner: ubuntu
        mode: '0644'

    - name: Copiar Mappers al Clúster
      copy:
        src: "./files/{{ item }}"
        dest: "/opt/censo/{{ item }}"
        mode: '0755'
      with_items:
        - mapper_provincia.py
        - mapper_sexo_permiso.py
        - mapper_antiguedad.py

    - name: Ejecutar procesamiento MapReduce y generar JSON para D3.js
      shell: |
        cat /home/ubuntu/conductores.txt | \
        python3 /opt/censo/mapper_provincia.py | \
        sort | uniq -c | grep -v "COD_PROVINCIA" | \
        awk '{printf "{\"key\": \"%s\", \"value\": %d},", $2, $1}' | \
        sed 's/,$//' | sed 's/^/[ /;s/$/ ]/' > /var/www/html/data/datos.json
      args:
        executable: /bin/bash

    - name: Ajustar permisos del archivo JSON final
      file:
        path: /var/www/html/data/datos.json
        owner: www-data
        group: www-data
        mode: '0644'